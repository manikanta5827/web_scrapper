# Render Blueprint for Web Scraper (Free Plan Compatible)
services:
  # The All-in-One Service (Runs API + Workers in a single process)
  - type: web
    name: web-scraper-optimized
    runtime: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - fromGroup: aws-ssm-credentials

# Essential Credentials to allow the app to fetch everything else from AWS SSM
envVarGroups:
  - name: aws-ssm-credentials
    envVars:
      - key: AWS_REGION
        value: "ap-south-1"
      - key: AWS_ACCESS_KEY_ID
        value: "REPLACE_WITH_YOUR_KEY"
      - key: AWS_SECRET_ACCESS_KEY
        value: "REPLACE_WITH_YOUR_SECRET"
