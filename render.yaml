# Render Blueprint for Web Scraper (Free Plan Compatible)
services:
  # The All-in-One Web Service (Runs API + Both Workers)
  - type: web
    name: web-scraper-all-in-one
    runtime: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - fromGroup: web-scraper-secrets

# Environment Group for secrets
envVarGroups:
  - name: web-scraper-secrets
    envVars:
      - key: DATABASE_URL
        value: "replace-with-your-supabase-url"
      - key: SUPABASE_URL
        value: "supabase-url-placeholder"
      - key: SUPABASE_ANON_KEY
        value: "supabase-anon-key-placeholder"
      - key: AWS_ACCESS_KEY_ID
        value: "replace-with-your-key"
      - key: AWS_SECRET_ACCESS_KEY
        value: "replace-with-your-secret"
      - key: AWS_REGION
        value: "ap-south-1"
      - key: AWS_BUCKET_NAME
        value: "web-scraper-raw-html"
