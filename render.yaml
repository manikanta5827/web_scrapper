# Render Blueprint for Web Scraper (Free Plan Compatible)
services:
  # The All-in-One Service (Runs API + Workers in a single process)
  - type: web
    name: web-scraper-optimized
    runtime: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - fromGroup: aws-s3-credentials
      - fromGroup: scraper-config

# Essential Credentials and Dynamic Configurations
envVarGroups:
  - name: aws-s3-credentials
    envVars:
      - key: AWS_REGION
        value: "ap-south-1"
      - key: AWS_ACCESS_KEY_ID
        sync: false # Set in Render Dashboard
      - key: AWS_SECRET_ACCESS_KEY
        sync: false # Set in Render Dashboard
      - key: AWS_BUCKET_NAME
        sync: false # Set in Render Dashboard

  - name: scraper-config
    envVars:
      - key: DATABASE_URL
        sync: false # Set in Render Dashboard
      - key: QUEUE_DATABASE_URL
        sync: false # Set in Render Dashboard
      - key: ENABLE_S3_UPLOAD
        value: "true"
      
      # Sitemap Worker Settings
      - key: SITEMAP_MIN_WORKERS
        value: "1"
      - key: SITEMAP_MAX_WORKERS
        value: "5"
      - key: SITEMAP_JOB_BATCH_SIZE
        value: "1"
      
      # Page Worker Settings (Optimized for 0.1 vCPU)
      - key: PAGE_MIN_WORKERS
        value: "1"
      - key: PAGE_MAX_WORKERS
        value: "15"
      - key: PAGE_JOB_BATCH_SIZE
        value: "25"
      - key: PAGE_CONCURRENT_REQUESTS_LIMIT
        value: "5"
      - key: PAGE_WORKER_TIMEOUT_MS
        value: "480000" # 8 minutes
      - key: PAGE_JOB_EXPIRATION_SECONDS
        value: "600" # 10 minutes
      
      # Monitoring & Cleanup
      - key: STALLED_URL_THRESHOLD_MS
        value: "600000"
      - key: STALLED_URL_CLEANUP_INTERVAL_MS
        value: "300000"

      # Additional tuning
      - key: HTTP_REQUEST_TIMEOUT_MS
        value: "30000"
      - key: RETRY_LIMIT
        value: "3"
      - key: DATABASE_BATCH_SIZE
        value: "500"
