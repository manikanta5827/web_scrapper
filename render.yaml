# Render Blueprint for Web Scraper
services:
  # 1. The API Server (Web Service)
  - type: web
    name: web-scraper-api
    runtime: docker
    plan: free
    dockerCommand: bun run db:push && bun run start:server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3003
      - fromGroup: web-scraper-secrets

  # 2. The Sitemap Worker (Background Worker)
  - type: worker
    name: web-scraper-sitemap-worker
    runtime: docker
    plan: free
    dockerCommand: bun run start:worker:sitemap
    envVars:
      - key: NODE_ENV
        value: production
      - fromGroup: web-scraper-secrets

  # 3. The Page Worker (Background Worker)
  - type: worker
    name: web-scraper-page-worker
    runtime: docker
    plan: free
    dockerCommand: bun run start:worker:page
    envVars:
      - key: NODE_ENV
        value: production
      - fromGroup: web-scraper-secrets

# Environment Group to share secrets across all services
envVarGroups:
  - name: web-scraper-secrets
    envVars:
      - key: DATABASE_URL
        value: "replace-with-your-supabase-url"
      - key: AWS_ACCESS_KEY_ID
        value: "replace-with-your-key"
      - key: AWS_SECRET_ACCESS_KEY
        value: "replace-with-your-secret"
      - key: AWS_REGION
        value: "ap-south-1"
      - key: AWS_BUCKET_NAME
        value: "web-scraper-raw-html"
